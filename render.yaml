services:
  - type: web
    name: agent-rocky-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_DIR
        value: chroma_store
      - key: FRONTEND_URL
        sync: false
    plan: free
